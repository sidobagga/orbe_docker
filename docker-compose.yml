version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: lbo-postgres
    environment:
      POSTGRES_DB: finmetrics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Admin0rbE
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - lbo-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: lbo-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - lbo-network

  # LBO API Service
  lbo-api:
    build: .
    container_name: lbo-api
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=Admin0rbE
      - DB_NAME=finmetrics
      - REDIS_URL=redis://redis:6379
      - FMP_API_KEY=${FMP_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - lbo-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  lbo-network:
    driver: bridge