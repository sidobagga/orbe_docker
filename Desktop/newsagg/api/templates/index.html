<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Article Summarizer</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        .loading {
            display: none;
        }
        .loading.active {
            display: block;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <div class="max-w-2xl mx-auto">
            <h1 class="text-3xl font-bold text-center mb-8 text-gray-800">Article Summarizer</h1>
            
            <div class="bg-white rounded-lg shadow-md p-6">
                <div class="mb-4">
                    <label for="url" class="block text-sm font-medium text-gray-700 mb-2">Article URL</label>
                    <input type="url" id="url" 
                           class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500"
                           placeholder="Paste article URL here">
                </div>
                
                <button onclick="summarizeArticle()" 
                        class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
                    Summarize
                </button>
            </div>

            <div class="mt-8">
                <div class="loading bg-white rounded-lg shadow-md p-6">
                    <div class="flex items-center justify-center">
                        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
                        <span class="ml-3 text-gray-700">Summarizing article...</span>
                    </div>
                </div>

                <div id="result" class="bg-white rounded-lg shadow-md p-6 hidden">
                    <h2 class="text-xl font-semibold mb-4 text-gray-800">Summary</h2>
                    <div id="summary" class="text-gray-700 whitespace-pre-line"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function summarizeArticle() {
            const url = document.getElementById('url').value;
            if (!url) {
                alert('Please enter a URL');
                return;
            }

            const loading = document.querySelector('.loading');
            const result = document.getElementById('result');
            const summary = document.getElementById('summary');

            loading.classList.add('active');
            result.classList.add('hidden');

            try {
                const response = await fetch('/summarize', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ url }),
                });

                if (!response.ok) {
                    throw new Error('Failed to summarize article');
                }

                const data = await response.json();
                summary.textContent = data.summary;
                result.classList.remove('hidden');
            } catch (error) {
                alert('Error: ' + error.message);
            } finally {
                loading.classList.remove('active');
            }
        }
    </script>
</body>
</html>
